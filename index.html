<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Style - Now Playing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <h1 class="logo">NEGMONG <span class="subtitle">(송주엽)</span></h1>
    </header>

    <main class="main-content">
        <section class="movie-section">
            <h2 class="section-title">Popular</h2>
            <div class="movie-grid" id="popular-grid">
                <!-- Javascript will inject popular movie cards here -->
            </div>
        </section>

        <section class="movie-section" style="margin-top: 50px;">
            <h2 class="section-title">Now Playing</h2>
            <div class="movie-grid" id="now-playing-grid">
                <!-- Javascript will inject now playing movie cards here -->
            </div>
        </section>

        <section class="movie-section" style="margin-top: 50px;">
            <h2 class="section-title">Top Rated</h2>
            <div class="movie-grid" id="top-rated-grid">
                <!-- Javascript will inject top rated movie cards here -->
            </div>
        </section>

        <section class="movie-section" style="margin-top: 50px;">
            <h2 class="section-title">Upcoming</h2>
            <div class="movie-grid" id="upcoming-grid">
                <!-- Javascript will inject upcoming movie cards here -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <h2 class="footer-logo">NEGMONG <span class="footer-subtitle">(송주엽)</span></h2>
            <p class="footer-description">Built with TMDB API. Styled with a premium Amber Yellow brand identity.</p>
            <p class="footer-copyright">&copy; 2026 Negmong. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
